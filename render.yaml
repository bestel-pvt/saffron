# Render Blueprint — pins Node version and build/start commands.
# To use: in Render dashboard, when creating a service, select "Apply Blueprint"
# instead of manual config. Or use "Blueprint Instance" from this file.
services:
  - type: web
    name: saffron-co
    runtime: node
    region: singapore
    plan: free
    # Force Node 20 (Render default is the latest LTS but pins drift; .node-version + this make it explicit)
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_ENV
        value: production
      # The rest must be set manually in Render dashboard (secrets):
      #   DATABASE_URL, JWT_SECRET, ADMIN_USERNAME, ADMIN_PASSWORD,
      #   STORAGE_BACKEND, R2_ACCOUNT_ID, R2_ACCESS_KEY_ID,
      #   R2_SECRET_ACCESS_KEY, R2_BUCKET, R2_PUBLIC_URL
